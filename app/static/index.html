<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Research Assistant</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f5f5;
      display: flex;
      flex-direction: column;
      height: 100vh;
      color: #1a1a1a;
    }

    header {
      background: #1e293b;
      color: #f8fafc;
      padding: 14px 20px;
      font-size: 16px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    header span.dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #22c55e;
      display: inline-block;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      max-width: 860px;
      width: 100%;
      margin: 0 auto;
    }

    .bubble {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 12px;
      line-height: 1.6;
      font-size: 14.5px;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .bubble.user {
      background: #1e293b;
      color: #f8fafc;
      align-self: flex-end;
      border-bottom-right-radius: 3px;
    }

    .bubble.assistant {
      background: #fff;
      border: 1px solid #e2e8f0;
      align-self: flex-start;
      border-bottom-left-radius: 3px;
    }

    .bubble.assistant .answer { margin-bottom: 12px; }

    .sources {
      margin-top: 10px;
      border-top: 1px solid #e2e8f0;
      padding-top: 10px;
    }

    .sources-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #64748b;
      margin-bottom: 6px;
    }

    .source-item {
      font-size: 12px;
      color: #475569;
      padding: 4px 0;
      display: flex;
      gap: 6px;
    }

    .source-item .score {
      color: #94a3b8;
      white-space: nowrap;
    }

    .source-item .meta {
      font-weight: 500;
      color: #334155;
    }

    .bubble.thinking {
      background: #fff;
      border: 1px solid #e2e8f0;
      align-self: flex-start;
      color: #94a3b8;
      font-style: italic;
    }

    .bubble.error {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #b91c1c;
      align-self: flex-start;
    }

    #input-bar {
      border-top: 1px solid #e2e8f0;
      background: #fff;
      padding: 14px 20px;
      display: flex;
      gap: 10px;
      flex-shrink: 0;
      max-width: 860px;
      width: 100%;
      margin: 0 auto;
    }

    /* full-width bar */
    #input-wrapper {
      background: #fff;
      border-top: 1px solid #e2e8f0;
      padding: 14px 20px;
      flex-shrink: 0;
    }
    #input-bar { border: none; padding: 0; margin: 0 auto; }

    textarea {
      flex: 1;
      resize: none;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 14px;
      font-family: inherit;
      line-height: 1.5;
      outline: none;
      height: 44px;
      max-height: 150px;
      overflow-y: auto;
    }
    textarea:focus { border-color: #6366f1; }

    button {
      background: #1e293b;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0 20px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    button:hover:not(:disabled) { background: #334155; }
    button:disabled { background: #94a3b8; cursor: not-allowed; }

    .empty-state {
      margin: auto;
      text-align: center;
      color: #94a3b8;
    }
    .empty-state h2 { font-size: 20px; color: #475569; margin-bottom: 8px; }
    .empty-state p  { font-size: 14px; }
  </style>
</head>
<body>

<header>
  <span class="dot"></span>
  Research Assistant
</header>

<div id="chat">
  <div class="empty-state">
    <h2>Ask anything about your papers</h2>
    <p>Queries are answered from your ingested academic articles.</p>
  </div>
</div>

<div id="input-wrapper">
  <div id="input-bar">
    <textarea id="q" placeholder="Ask a question about the papers…" rows="1"></textarea>
    <button id="send-btn" onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
  const chat = document.getElementById('chat');
  const textarea = document.getElementById('q');
  const sendBtn = document.getElementById('send-btn');

  // Auto-resize textarea
  textarea.addEventListener('input', () => {
    textarea.style.height = '44px';
    textarea.style.height = Math.min(textarea.scrollHeight, 150) + 'px';
  });

  // Send on Enter (Shift+Enter for newline)
  textarea.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  function clearEmptyState() {
    const es = chat.querySelector('.empty-state');
    if (es) es.remove();
  }

  function appendBubble(cls, html) {
    const div = document.createElement('div');
    div.className = `bubble ${cls}`;
    div.innerHTML = html;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
  }

  function escapeHtml(text) {
    return text
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  async function sendMessage() {
    const question = textarea.value.trim();
    if (!question || sendBtn.disabled) return;

    clearEmptyState();
    textarea.value = '';
    textarea.style.height = '44px';
    sendBtn.disabled = true;

    appendBubble('user', escapeHtml(question));
    const thinking = appendBubble('thinking', 'Searching papers…');

    try {
      const res = await fetch('/query/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question, top_k: 8 }),
      });

      if (!res.ok) {
        const err = await res.text();
        throw new Error(err);
      }

      const data = await res.json();
      thinking.remove();

      // Build sources HTML
      let sourcesHtml = '';
      if (data.sources && data.sources.length > 0) {
        const items = data.sources.map(s => {
          const pct = Math.round(s.score * 100);
          const title = escapeHtml(s.title || 'Unknown');
          const section = escapeHtml(s.section || '');
          return `<div class="source-item">
            <span class="score">${pct}%</span>
            <span><span class="meta">${title}</span>${section ? ' — ' + section : ''}</span>
          </div>`;
        }).join('');
        sourcesHtml = `
          <div class="sources">
            <div class="sources-label">Sources</div>
            ${items}
          </div>`;
      }

      appendBubble('assistant', `
        <div class="answer">${escapeHtml(data.answer)}</div>
        ${sourcesHtml}
      `);

    } catch (err) {
      thinking.remove();
      appendBubble('error', 'Error: ' + escapeHtml(err.message));
    } finally {
      sendBtn.disabled = false;
      textarea.focus();
    }
  }
</script>
</body>
</html>
